services:
  user-service:
    build: ./user-service
    image: user-service:latest
    networks:
      - my_overlay_network
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  order-service:
    build: ./order-service
    image: order-service:latest
    networks:
      - my_overlay_network
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
    environment:
      - USER_SERVICE_URL=http://user-service:3001

  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    networks:
      - my_overlay_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf

networks:
  my_overlay_network:
    external: true

configs:
  nginx_config:
    file: ./nginx.conf